<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

<main class="app">

  <h1>Symbol Portal Simulator</h1>

  <button id="startBtn">Start</button>
  <button id="runnerModeBtn">Runner Mode</button>
  <button id="scModeBtn">SC Mode</button>

  <section class="practice-layout">

    <section class="chatbox">
      <h2>Chat</h2>
      <div id="chatMessages"></div>
    </section>

    <section class="arena-box">
      <div id="arena">
        <div class="platform top"></div>
        <div class="platform middle-left"></div>
        <div class="platform middle-right"></div>
        <div class="platform bottom-left"></div>
        <div class="platform bottom-middle"></div>
        <div class="platform bottom-right"></div>
        <div class="platform floor"></div>

        <div class="portal p1 hidden"></div>
        <div class="portal p2 hidden"></div>
        <div class="portal p3 hidden"></div>
        <div class="portal p4 hidden"></div>
        <div class="portal p5 hidden"></div>
        <div class="portal p6 hidden"></div>
        <div class="portal p7 hidden"></div>
        <div class="portal p8 hidden"></div>
      </div>
    </section>

  </section>

  <div id="status"> </div>
  <div id="sequence"></div>

</main>

</body>

<script src="js/app.js"></script>

</html>
