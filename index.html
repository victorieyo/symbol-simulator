<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

<main class="app">

  <header class="app-header">
    <h1>Symbol Portal Simulator</h1>

    <div class="controls">
      <button id="startBtn">Start</button>

      <div class="mode-row">
        <label for="modeSelect">Mode:</label>

        <select id="modeSelect">
          <option value="runner">Runner</option>
          <option value="sc">Symbol Catcher</option>
        </select>
      </div>

      <p id="timerText">Time: --</p>
    </div>
  </header>

  <section class="practice-layout">

    <section class="chatbox">
      <h2>Chat</h2>

      <div id="chatMessages"></div>

      <div class="chat-input-area">
        <input id="chatInput" type="text" placeholder=". . ." />
        <button id="chatSubmitBtn">Send</button>
      </div>
    </section>

    <section class="arena-box">
      <div id="arena">
        <div id="sequence"></div>
        <div id="resultSequence" class="hidden"></div>

        <div class="platform top"></div>
        <div class="platform middle-left"></div>
        <div class="platform middle-right"></div>
        <div class="platform bottom-left"></div>
        <div class="platform bottom-middle"></div>
        <div class="platform bottom-right"></div>
        <div class="platform floor"></div>

        <div class="portal p1 hidden"></div>
        <div class="portal p2 hidden"></div>
        <div class="portal p3 hidden"></div>
        <div class="portal p4 hidden"></div>
        <div class="portal p5 hidden"></div>
        <div class="portal p6 hidden"></div>
        <div class="portal p7 hidden"></div>
        <div class="portal p8 hidden"></div>
      </div>
    </section>

  </section>

  <div id="status"></div>

</main>

</body>

<script src="js/app.js"></script>

</html>
